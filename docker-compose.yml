services:
  web:
    image: ghcr.io/pegano/imposter-game-web:latest
    ports:
      - "3010:80"
    depends_on:
      - server
    restart: unless-stopped

  server:
    image: ghcr.io/pegano/imposter-game-server:latest
    environment:
      - DATABASE_URL=file:/data/imposter.db
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - db_data:/data
    restart: unless-stopped

volumes:
  db_data:
